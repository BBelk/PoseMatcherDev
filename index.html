<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PoseMatcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="top-bar">
    <h1>PoseMatcher</h1>
    <button id="clear-all-btn" style="display:none">Clear All</button>
  </div>

  <div id="top-row">
    <section id="reference-section">
      <h2>Reference Pose</h2>
      <div id="reference-box" class="pose-box">
        <div class="upload-prompt" data-for="ref-file">
          <p>Tap or drag an image here</p>
          <label class="upload-label" for="ref-file">Choose Image</label>
          <input type="file" id="ref-file" class="file-input" accept="image/*">
        </div>
        <img id="ref-img" class="pose-img" alt="Reference pose">
        <canvas id="ref-canvas"></canvas>
        <div id="ref-status" class="status"></div>
        <div id="ref-meta" class="img-meta"></div>
        <button class="clear-btn" title="Clear image">&times;</button>
      </div>
    </section>

    <section id="output-section">
      <h2>Output</h2>
      <div id="output-box" class="pose-box">
        <canvas id="overlay-canvas"></canvas>
        <div id="overlay-status" class="status"></div>
        <img id="output-gif" class="output-gif">
      </div>
      <button id="generate-btn">Generate</button>
      <div class="setting-compact">
        <label for="frame-duration">Frame duration (s)</label>
        <input type="number" id="frame-duration" min="0.1" max="10" step="0.1" value="0.5">
      </div>
      <div class="setting-compact">
        <label for="rotate-toggle">Match to reference rotation</label>
        <input type="checkbox" id="rotate-toggle" checked>
      </div>
      <div class="setting-compact">
        <label for="frame-counter-toggle">Frame counter</label>
        <input type="checkbox" id="frame-counter-toggle">
      </div>
      <div class="setting-compact">
        <label for="align-part">Part to match</label>
        <select id="align-part">
          <option value="eyes_mid" selected>Eyes - Middle</option>
          <option value="shoulders_mid">Shoulders - Middle</option>
          <option value="hips_mid">Hips - Middle</option>
          <option value="0">Nose</option>
          <option value="1">Left Eye</option>
          <option value="2">Right Eye</option>
          <option value="3">Left Ear</option>
          <option value="4">Right Ear</option>
          <option value="5">Left Shoulder</option>
          <option value="6">Right Shoulder</option>
          <option value="7">Left Elbow</option>
          <option value="8">Right Elbow</option>
          <option value="9">Left Wrist</option>
          <option value="10">Right Wrist</option>
          <option value="11">Left Hip</option>
          <option value="12">Right Hip</option>
          <option value="13">Left Knee</option>
          <option value="14">Right Knee</option>
          <option value="15">Left Ankle</option>
          <option value="16">Right Ankle</option>
        </select>
      </div>
    </section>
  </div>

  <section id="compare-section">
    <h2>Comparisons</h2>
    <div id="compare-grid">
      <!-- comparison cards added dynamically -->
    </div>
    <div id="compare-upload">
      <label class="upload-label" for="cmp-file">Add Images</label>
      <input type="file" id="cmp-file" class="file-input" accept="image/*" multiple>
    </div>
  </section>

  <section id="settings-section">
    <h2>Settings</h2>
    <div class="setting">
      <label for="score-thresh">Person detection threshold</label>
      <input type="range" id="score-thresh" min="0.01" max="1" step="0.01" value="0.3">
      <span id="score-thresh-val">0.3</span>
    </div>
    <div class="setting">
      <label for="kp-thresh">Keypoint confidence threshold</label>
      <input type="range" id="kp-thresh" min="0.01" max="1" step="0.01" value="0.3">
      <span id="kp-thresh-val">0.3</span>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.3/dist/ort.min.js"></script>
  <script src="lib/ffmpeg/ffmpeg.js"></script>
  <script src="pose.js"></script>
  <script src="index.js"></script>
</body>
</html>
