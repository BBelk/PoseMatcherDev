<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PoseMatcher</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>PoseMatcher</h1>

  <div id="boxes-row">
    <section id="reference-section">
      <h2>Reference Pose</h2>
      <div id="reference-box" class="pose-box">
        <div class="upload-prompt" data-for="ref-file">
          <p>Tap or drag an image here</p>
          <label class="upload-label" for="ref-file">Choose Image</label>
          <input type="file" id="ref-file" class="file-input" accept="image/*">
        </div>
        <img id="ref-img" class="pose-img" alt="Reference pose">
        <canvas id="ref-canvas"></canvas>
        <div id="ref-status" class="status"></div>
        <button class="clear-btn" title="Clear image">&times;</button>
      </div>
    </section>

    <section id="compare-section">
      <h2>Comparison</h2>
      <div id="compare-box" class="pose-box">
        <div class="upload-prompt" data-for="cmp-file">
          <p>Tap or drag an image here</p>
          <label class="upload-label" for="cmp-file">Choose Image</label>
          <input type="file" id="cmp-file" class="file-input" accept="image/*">
        </div>
        <img id="cmp-img" class="pose-img" alt="Comparison pose">
        <canvas id="cmp-canvas"></canvas>
        <div id="cmp-status" class="status"></div>
        <button class="clear-btn" title="Clear image">&times;</button>
      </div>
    </section>

    <section id="overlay-section">
      <h2>Overlay</h2>
      <div id="overlay-box" class="pose-box">
        <canvas id="overlay-canvas"></canvas>
        <div id="overlay-status" class="status"></div>
      </div>
      <button id="overlay-btn">Overlay</button>
      <div class="setting">
        <label for="ref-alpha">Reference alpha</label>
        <input type="range" id="ref-alpha" min="0" max="1" step="0.05" value="0.5">
        <span id="ref-alpha-val">0.5</span>
      </div>
      <div class="setting">
        <label for="cmp-alpha">Comparison alpha</label>
        <input type="range" id="cmp-alpha" min="0" max="1" step="0.05" value="0.5">
        <span id="cmp-alpha-val">0.5</span>
      </div>
      <div class="setting">
        <label for="rotate-toggle">Correct rotation</label>
        <input type="checkbox" id="rotate-toggle" checked>
      </div>
      <div id="align-options">
        <label><input type="radio" name="align" value="head" checked> Head</label>
        <label><input type="radio" name="align" value="shoulders"> Shoulders</label>
        <label><input type="radio" name="align" value="hips"> Hips</label>
      </div>
    </section>
  </div>

  <section id="settings-section">
    <h2>Settings</h2>
    <div class="setting">
      <label for="score-thresh">Person detection threshold</label>
      <input type="range" id="score-thresh" min="0.01" max="1" step="0.01" value="0.3">
      <span id="score-thresh-val">0.3</span>
    </div>
    <div class="setting">
      <label for="kp-thresh">Keypoint confidence threshold</label>
      <input type="range" id="kp-thresh" min="0.01" max="1" step="0.01" value="0.3">
      <span id="kp-thresh-val">0.3</span>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.3/dist/ort.min.js"></script>
  <script src="pose.js"></script>
  <script src="index.js"></script>
</body>
</html>
